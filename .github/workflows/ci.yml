name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ── Lint + Syntax ────────────────────────────────────────────────────────
  lint:
    name: Syntax check (py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check all Python files
        run: |
          find scripts/ tests/ -name "*.py" ! -path "*/__pycache__/*" ! -path "*/.archive/*" \
            -exec python -m py_compile {} \;
          python -m py_compile artha.py
          echo "✓ Syntax OK"

  # ── Ruff Linter ───────────────────────────────────────────────────────────
  ruff:
    name: Ruff lint (F811, F401, F841)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Run ruff
        run: ruff check scripts/ tests/ --config pyproject.toml

  # ── Import Convention ─────────────────────────────────────────────────────
  import-check:
    name: No dual-import patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check for 'from scripts.X' inside scripts/
        run: |
          python -c "
          import ast, pathlib, sys
          bad = []
          for p in sorted(pathlib.Path('scripts').rglob('*.py')):
              if '__pycache__' in str(p): continue
              for n in ast.walk(ast.parse(p.read_text())):
                  if isinstance(n, ast.ImportFrom) and (n.module or '').startswith('scripts.'):
                      bad.append(f'{p}:{n.lineno}: from {n.module}')
          if bad:
              print('ERROR: from scripts.X imports found inside scripts/:')
              print('\n'.join(bad))
              print('Use from X import ... instead (scripts/ is on sys.path).')
              sys.exit(1)
          print('✓ No dual-import patterns')
          "

  # ── Test Suite ────────────────────────────────────────────────────────────
  tests:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install pytest pytest-mock

      - name: Debug environment
        run: |
          python --version
          python -c "import sqlite3; c=sqlite3.connect(':memory:'); c.execute('CREATE VIRTUAL TABLE _t USING fts5(x)'); print('FTS5: OK')" || echo 'FTS5: NOT AVAILABLE'
          python -c "import sqlite3; print('SQLite:', sqlite3.sqlite_version)"
          python -c "import pydantic; print('pydantic:', pydantic.__version__)"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=long --ignore=tests/work
        env:
          PYTHONPATH: scripts
          ARTHA_NO_REEXEC: "1"

  # ── PII Scan on Specs ─────────────────────────────────────────────────────
  pii-specs:
    name: PII scan (spec files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scan spec files for PII
        run: |
          FAIL=0
          # Files exempt from PII scan (contain intentional test patterns)
          EXEMPT="specs/supercharge-reloaded.md"
          for f in specs/*.md config/Artha.core.md config/actions.yaml; do
            if [ -f "$f" ]; then
              skip=false
              for ex in $EXEMPT; do [ "$f" = "$ex" ] && skip=true; done
              if [ "$skip" = true ]; then
                echo "Skipping (exempt): $f"
                continue
              fi
              if ! python scripts/pii_guard.py scan "$f"; then
                echo "::error file=$f::PII detected in $f"
                FAIL=1
              fi
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "✓ PII scan clean" || exit 1

  # ── Connector handler imports ─────────────────────────────────────────────
  connectors-syntax:
    name: Connector handler syntax + import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal deps
        run: pip install pyyaml
      - name: Syntax check all connector handlers
        run: |
          for f in scripts/connectors/*.py; do
            python -m py_compile "$f" && echo "OK $f"
          done
      - name: Validate connectors.yaml parses
        run: |
          python -c "
          import yaml, os
          path = 'config/connectors.yaml'
          if not os.path.exists(path):
              path = 'config/channels.example.yaml'
              if not os.path.exists(path):
                  print('connectors.yaml not in repo (gitignored — user-specific config). Skipping.')
                  raise SystemExit(0)
          with open(path) as f:
              cfg = yaml.safe_load(f)
          names = list((cfg or {}).get('connectors', cfg or {}).keys())
          print(f'{path}: {len(names)} entries — {names}')
          "
      - name: Validate actions.yaml parses
        run: |
          python -c "
          import yaml
          with open('config/actions.yaml') as f:
              cfg = yaml.safe_load(f)
          actions = list(cfg.get('actions', {}).keys())
          print(f'actions.yaml: {len(actions)} actions — {actions}')
          "

  # ── Schema Validation ─────────────────────────────────────────────────────
  schema-validation:
    name: Validate example profile against schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyyaml jsonschema
      - name: Validate example profile
        run: |
          python -c "
          import json, yaml, jsonschema
          with open('config/user_profile.example.yaml') as f:
              profile = yaml.safe_load(f)
          with open('config/user_profile.schema.json') as f:
              schema = json.load(f)
          jsonschema.validate(instance=profile, schema=schema)
          print('✓ user_profile.example.yaml validates against schema')
          "
