schema_version: '1.0'

# run_on: Platform gating for multi-machine setups.
# Values: all (default), darwin (macOS only), windows, linux, or a list [darwin, windows].
# Maps to platform.system().lower(). Connectors not matching the current platform are
# skipped silently by pipeline.py. Single-machine users should leave all values as 'all'.

connectors:
  gmail:
    type: email
    provider: google
    enabled: true
    run_on: all
    description: Gmail — primary personal email
    auth:
      method: oauth2
      token_file: .tokens/gmail-token.json
      setup_script: scripts/setup_google_oauth.py
      scopes:
      - https://www.googleapis.com/auth/gmail.readonly
    fetch:
      handler: scripts/connectors/google_email.py
      default_max_results: 200
      default_lookback: 7d
    output:
      format: jsonl
      fields:
      - id
      - thread_id
      - subject
      - from
      - to
      - date_iso
      - body
      - labels
      - snippet
      source_tag: ''
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source gmail
    retry:
      max_retries: 3
      base_delay: 1.0
      max_delay: 30.0
  outlook_email_personal:
    type: email
    provider: microsoft
    enabled: true
    run_on: all
    description: Outlook / Microsoft 365 email — personal account (your.personal@example.com)
    auth:
      method: oauth2
      token_file: .tokens/msgraph-personal-token.json
      setup_script: scripts/setup_msgraph_oauth.py
      scopes:
      - Mail.Read
      - Mail.ReadBasic
    fetch:
      handler: scripts/connectors/msgraph_email.py
      default_max_results: 200
      default_lookback: 7d
    output:
      format: jsonl
      fields:
      - id
      - thread_id
      - subject
      - from
      - to
      - date_iso
      - body
      - labels
      - snippet
      source_tag: outlook_personal
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source outlook_email_personal
    retry:
      max_retries: 3
      base_delay: 1.0
      max_delay: 30.0
  outlook_email:
    type: email
    provider: microsoft
    enabled: true
    run_on: windows
    description: Outlook / Microsoft 365 email — work account (you@yourcompany.com)
    auth:
      method: oauth2
      token_file: .tokens/msgraph-token.json
      setup_script: scripts/setup_msgraph_oauth.py
      scopes:
      - Mail.Read
      - Mail.ReadBasic
    fetch:
      handler: scripts/connectors/msgraph_email.py
      default_max_results: 200
      default_lookback: 7d
    output:
      format: jsonl
      fields:
      - id
      - thread_id
      - subject
      - from
      - to
      - date_iso
      - body
      - labels
      - snippet
      source_tag: outlook_work
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source outlook_email
    retry:
      max_retries: 3
      base_delay: 1.0
      max_delay: 30.0
  icloud_email:
    type: email
    provider: imap
    enabled: false
    run_on: all
    description: iCloud / Apple Mail (IMAP)
    auth:
      method: app_password
      credential_key: artha-icloud-password
      server: imap.mail.me.com
      port: 993
      setup_script: scripts/setup_icloud_auth.py
    fetch:
      handler: scripts/connectors/imap_email.py
      default_max_results: 200
      default_lookback: 7d
    output:
      format: jsonl
      fields:
      - id
      - thread_id
      - subject
      - from
      - to
      - date_iso
      - body
      - labels
      - snippet
      source_tag: icloud
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source icloud_email
    retry:
      max_retries: 2
      base_delay: 2.0
      max_delay: 30.0
  google_calendar:
    type: calendar
    provider: google
    enabled: true
    run_on: all
    description: Google Calendar — holidays, Indian holidays, contact birthdays. Not used for scheduling (slots not blocked).
    auth:
      method: oauth2
      token_file: .tokens/gmail-token.json
      setup_script: scripts/setup_google_oauth.py
      scopes:
      - https://www.googleapis.com/auth/calendar.readonly
    fetch:
      handler: scripts/connectors/google_calendar.py
      default_range_days: 7
      calendars_from_profile: integrations.google_calendar.calendar_ids
    output:
      format: jsonl
      fields:
      - id
      - calendar
      - summary
      - start
      - end
      - all_day
      - location
      - attendees
      source_tag: ''
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source google_calendar
  outlook_calendar_personal:
    type: calendar
    provider: microsoft
    enabled: true
    run_on: all
    description: Outlook Calendar — personal account (your.personal@example.com)
    auth:
      method: oauth2
      token_file: .tokens/msgraph-personal-token.json
      setup_script: scripts/setup_msgraph_oauth.py
      scopes:
      - Calendars.Read
    fetch:
      handler: scripts/connectors/msgraph_calendar.py
      default_range_days: 7
    output:
      format: jsonl
      fields:
      - id
      - calendar
      - summary
      - start
      - end
      - all_day
      - location
      - attendees
      source_tag: outlook_personal
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source outlook_calendar_personal
  outlook_calendar:
    type: calendar
    provider: microsoft
    enabled: true
    run_on: windows
    description: Outlook Calendar — work account (you@yourcompany.com). PRIMARY calendar for scheduling.
    auth:
      method: oauth2
      token_file: .tokens/msgraph-token.json
      setup_script: scripts/setup_msgraph_oauth.py
      scopes:
      - Calendars.Read
    fetch:
      handler: scripts/connectors/msgraph_calendar.py
      default_range_days: 7
    output:
      format: jsonl
      fields:
      - id
      - calendar
      - summary
      - start
      - end
      - all_day
      - location
      - attendees
      source_tag: outlook_work
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source outlook_calendar
  icloud_calendar:
    type: calendar
    provider: caldav
    enabled: false
    run_on: all
    description: iCloud Family Calendar (CalDAV) — family events shared via iCloud; visible to all family iPhones
    auth:
      method: app_password
      credential_key: artha-icloud-password
      server: caldav.icloud.com
      setup_script: scripts/setup_icloud_auth.py
    fetch:
      handler: scripts/connectors/caldav_calendar.py
      default_range_days: 7
    output:
      format: jsonl
      fields:
      - id
      - calendar
      - summary
      - start
      - end
      - all_day
      - location
      - attendees
      source_tag: icloud
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source icloud_calendar
  canvas_lms:
    type: lms
    provider: canvas
    enabled: false
    run_on: all
    description: Canvas LMS — school assignments and grades
    auth:
      method: api_key
      credential_key_from_profile: children[].school.canvas_keychain_key
      setup_script: scripts/canvas_fetch.py --setup
    fetch:
      handler: scripts/connectors/canvas_lms.py
    output:
      format: direct_state_write
      target: state/kids.md
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source canvas_lms
  onenote_personal:
    type: notes
    provider: microsoft
    enabled: true
    run_on: all
    description: Microsoft OneNote — personal notebooks (your.personal@example.com)
    auth:
      method: oauth2
      token_file: .tokens/msgraph-personal-token.json
      setup_script: scripts/setup_msgraph_oauth.py
      scopes:
      - Notes.Read
      - Notes.ReadWrite
    fetch:
      handler: scripts/connectors/onenote.py
      include_personal: true
    output:
      format: direct_state_write
      target: state/onenote_personal_progress.md
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source onenote_personal
  onenote:
    type: notes
    provider: microsoft
    enabled: true
    run_on: windows
    description: Microsoft OneNote — work notebooks (you@yourcompany.com)
    auth:
      method: oauth2
      token_file: .tokens/msgraph-token.json
      setup_script: scripts/setup_msgraph_oauth.py
      scopes:
      - Notes.Read
      - Notes.ReadWrite
    fetch:
      handler: scripts/connectors/onenote.py
      include_personal: false
    output:
      format: direct_state_write
      target: state/onenote_progress.md
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source onenote
  rss_feed:
    type: feed
    provider: rss
    enabled: true
    run_on: all
    description: RSS/Atom feed reader — stdlib-only, no auth required. Powers AI
      Trend Radar (PR-3) plus any other domain-relevant feeds.
    auth:
      method: none
    fetch:
      handler: scripts/connectors/rss_feed.py
      timeout_seconds: 10
      default_max_results: 50
      feeds:
        - url: "https://openai.com/blog/rss.xml"
          tag: "openai_blog"
          domain: "digital"
        - url: "https://simonwillison.net/atom/everything/"
          tag: "simon_willison"
          domain: "digital"
        - url: "https://huggingface.co/blog/feed.xml"
          tag: "huggingface_blog"
          domain: "digital"
        - url: "https://blog.google/technology/ai/rss/"
          tag: "google_ai"
          domain: "digital"
        - url: "https://www.anthropic.com/research/rss.xml"
          tag: "anthropic"
          domain: "digital"
        - url: "https://www.microsoft.com/en-us/research/feed/"
          tag: "msresearch"
          domain: "digital"
        - url: "https://hnrss.org/newest?q=AI+LLM+GPT"
          tag: "hn_ai"
          domain: "digital"
    output:
      format: jsonl
      source_tag: rss
  workiq_bridge:
    type: multi
    provider: workiq
    enabled: true
    run_on: windows
    description: WorkIQ — corporate M365 data (calendar, email, Teams, people, docs)
    auth:
      method: none
    fetch:
      handler: scripts/connectors/workiq_bridge.py
      modes:
      - calendar
      - email
      - teams
      - people
      - documents
      default_lookback: 48h
      subprocess_timeout_seconds: 90
      cache_file: tmp/.workiq_cache.json
      cache_ttl:
        calendar: 14400
        email: 3600
        teams: 7200
        people: 604800
        documents: 14400
    output:
      format: jsonl
      source_tag: workiq
    health_check: true
    mcp:
      prefer_mcp: true   # §21.1: Agency MCP is primary on Windows
      server: workiq      # agency mcp workiq
      fallback: scripts/pipeline.py --source workiq_bridge
    retry:
      max_retries: 1
      base_delay: 5.0
      max_delay: 30.0
  ado_workitems:
    type: project_tracker
    provider: azure_devops
    enabled: true
    run_on: windows
    description: Azure DevOps — work items assigned to me
    auth:
      method: az_cli
      az_resource: 499b84ac-1321-427f-aa17-267ca6975798
      fallback_method: api_key
      fallback_credential_key: artha-ado-pat
    fetch:
      handler: scripts/connectors/ado_workitems.py
      api_version: '7.1'
      default_max_results: 200
      org_from_profile: integrations.azure_devops.organization_url
      project_from_profile: integrations.azure_devops.project
    output:
      format: jsonl
      fields:
      - id
      - title
      - state
      - type
      - priority
      - target_date
      - changed_date
      - iteration_path
      source_tag: ado
    health_check: true
    mcp:
      prefer_mcp: true   # §21.1: Agency MCP is primary on Windows
      server: ado          # agency mcp ado
      fallback: scripts/pipeline.py --source ado_workitems
    retry:
      max_retries: 2
      base_delay: 2.0
      max_delay: 30.0
  outlookctl_bridge:
    type: calendar_fallback
    provider: outlook
    enabled: true
    description: 'Fast Outlook calendar fallback via outlookctl COM bridge. Windows-only.
      Used for /status quick checks when WorkIQ cache is stale. Latency: ~3s (vs WorkIQ
      ~60s). Attendee list not available (outlookctl 0.1.0 limitation).

      '
    platform: windows
    run_on: windows
    auth:
      method: none
    fetch:
      handler: scripts/connectors/outlookctl_bridge.py
      lookahead_days: 2
    output:
      format: jsonl
      fields:
      - uid
      - title
      - start
      - end
      - duration_min
      - is_all_day
      - is_online
      - location
      - is_recurring
      - organizer
      source_tag: outlook
    health_check: true
    retry:
      max_retries: 1
      base_delay: 1.0
      max_delay: 5.0
  apple_health:
    type: health
    provider: apple
    enabled: false
    run_on: all
    description: "Apple Health XML export parser — local file only, no network access.\
      \ Export from iPhone: Health app → Profile → Export All Health Data. Place the\
      \ export.zip in any directory and run:\n  python scripts/pipeline.py --source\
      \ apple_health --file path/to/export.zip\nOutput goes to state/health.md (encrypted\
      \ at rest).\n"
    auth:
      method: none
    fetch:
      handler: scripts/connectors/apple_health.py
      default_max_results: 10000
      default_lookback: 365d
    output:
      format: jsonl
      fields:
      - source
      - type
      - type_short
      - value
      - unit
      - date_iso
      - device
      - id
      source_tag: apple_health
    health_check: false
    mcp:
      prefer_mcp: false
    retry:
      max_retries: 1
      base_delay: 0.0
      max_delay: 0.0
  whatsapp_local:
    type: messaging
    provider: whatsapp
    enabled: true
    run_on: all
    description: 'WhatsApp local ChatStorage.sqlite reader — extracts recent messages
      from the WhatsApp Desktop app database. No API key needed. macOS + Windows.

      '
    auth:
      method: none
    fetch:
      handler: scripts/connectors/whatsapp_local.py
      default_max_results: 200
      default_lookback: 48h
      include_groups: true
      snippet_max_chars: 300
    output:
      format: jsonl
      fields:
      - id
      - contact_name
      - phone
      - timestamp
      - date_iso
      - direction
      - snippet
      - source
      - group_name
      - is_group
      source_tag: whatsapp
    health_check: true
    mcp:
      prefer_mcp: false
    retry:
      max_retries: 1
      base_delay: 0.0
      max_delay: 0.0
  imessage_local:
    type: messaging
    provider: apple
    enabled: true
    run_on: all
    description: 'iMessage / SMS local chat.db reader — extracts recent messages from
      macOS Messages database. macOS ONLY. Requires Full Disk Access for the terminal
      app (System Settings → Privacy & Security → Full Disk Access).

      '
    auth:
      method: none
    fetch:
      handler: scripts/connectors/imessage_local.py
      default_max_results: 200
      default_lookback: 48h
      include_groups: true
      snippet_max_chars: 300
    one_time_sweep:
      completed: true
      completed_date: '2026-03-19'
      oldest_message: '2016-05-05'
      total_messages_in_db: 30363
      total_messages_processed: 30146
      decode_method: attributedBody binary (NSAttributedString streamtyped, length-prefix
        UTF-8 scanning)
      state_files_updated:
      - digital.md
      - health-metrics.md
      - comms.md
      - finance.md
      - kids.md
      - contacts.md
      - home.md
      - community.md
    output:
      format: jsonl
      fields:
      - id
      - contact_name
      - phone
      - timestamp
      - date_iso
      - direction
      - snippet
      - source
      - group_name
      - is_group
      source_tag: imessage
    health_check: true
    mcp:
      prefer_mcp: false
    retry:
      max_retries: 1
      base_delay: 0.0
      max_delay: 0.0
  homeassistant:
    type: iot
    provider: homeassistant
    enabled: true
    run_on: all
    description: 'Home Assistant local smart home hub — reads device states, energy
      usage, and sensor data via the HA REST API. LAN-only: skipped silently when
      not on the home network. Requires a long-lived access token.

      '
    requires_lan: true
    auth:
      method: api_key
      credential_key: artha-ha-token
      setup_script: scripts/setup_ha_token.py
    fetch:
      handler: scripts/connectors/homeassistant.py
      ha_url: http://homeassistant.local:8123
      timeout_seconds: 10
      default_max_results: 500
      include_history: false
      exclude_domains: []
      entity_allowlist: []
      entity_blocklist: []
    output:
      format: jsonl
      fields:
      - entity_id
      - state
      - attributes
      - last_changed
      - domain
      - source
      source_tag: homeassistant
    health_check: true
    mcp:
      prefer_mcp: false
      fallback: scripts/pipeline.py --source homeassistant
    retry:
      max_retries: 2
      base_delay: 1.0
      max_delay: 5.0

  # ── CONNECT Phase 1 (Slack P0) ───────────────────────────────────────────
  # ── CONNECT Phase 3 (Task Managers) ─────────────────────────────────────
  todoist:
    type: task_manager
    provider: todoist
    enabled: false           # Enable via: python scripts/setup_todoist.py
    run_on: all
    description: >
      Todoist REST API v2 — reads active + completed tasks for open item tracking.
      Single-writer sync: Artha creates tasks once; Todoist owns thereafter.
      Run scripts/setup_todoist.py to configure.
    auth:
      method: keyring
      credential_key: artha-todoist
      setup_script: scripts/setup_todoist.py
    fetch:
      handler: scripts/connectors/todoist.py
      default_max_results: 100
      default_lookback: 7d
      # project_filter: []   # Optional: restrict to specific project names
    output:
      format: jsonl
      fields:
        - id
        - content
        - description
        - project_name
        - labels
        - priority
        - due_date
        - due_string
        - is_completed
        - completed_at
        - created_at
        - source
        - section_name
        - parent_id
        - url
      source_tag: todoist
    health_check: true
    retry:
      max_retries: 3
      base_delay: 1.0
      max_delay: 30.0

  apple_reminders:
    type: task_manager
    provider: apple
    enabled: false           # macOS only — requires pyobjc-framework-EventKit
    run_on: darwin
    description: >
      Apple Reminders via macOS EventKit — reads reminders for open item tracking.
      Single-writer sync: Artha creates reminders once; Reminders app owns thereafter.
      Requires: pip install 'artha[apple]'
    auth:
      method: system_permission    # No token — uses macOS TCC permission dialog
      setup_script: null
    fetch:
      handler: scripts/connectors/apple_reminders.py
      default_max_results: 200
      default_lookback: 30d
      # list_filter: []    # Optional: restrict to specific list names
    output:
      format: jsonl
      fields:
        - id
        - title
        - notes
        - list_name
        - due_date
        - is_completed
        - completed_at
        - created_at
        - priority
        - source
      source_tag: apple_reminders
    health_check: true
    retry:
      max_retries: 1
      base_delay: 0.0
      max_delay: 0.0

  # ── CONNECT Phase 5 (Financial) ──────────────────────────────────────────
  plaid:
    type: financial
    provider: plaid
    enabled: false           # Enable via: python scripts/setup_plaid.py
    run_on: all
    description: >
      Plaid financial data connector — fetches AGGREGATED transaction summaries only.
      PRIVACY: Raw transaction data is NEVER stored. Only category-level
      spend summaries persist. Run scripts/setup_plaid.py to configure.
    auth:
      method: keyring
      credential_key: artha-plaid-access-token
      setup_script: scripts/setup_plaid.py
    fetch:
      handler: scripts/connectors/plaid_connector.py
      default_max_results: 500
      default_lookback: 30d
      environment: sandbox     # Change to production after setup
    output:
      format: jsonl
      fields:
        - category
        - merchant_group
        - month
        - transaction_count
        - total_amount
        - currency
        - source
      source_tag: plaid
    health_check: true
    retry:
      max_retries: 3
      base_delay: 1.5
      max_delay: 30.0

  # ── CONNECT Phase 1 (Slack P0) ───────────────────────────────────────────
  slack:
    type: messaging
    provider: slack
    enabled: true            # MCP-sourced — no bot token required
    run_on: all
    description: 'Slack workspace message ingestion via Claude MCP (claude.ai Slack
      integration). No bot token needed — reads channels the user is a member of.
      Bot connector (setup_slack.py) remains unused; MCP is preferred.

      Workspace: UW Foster HMBA alumni network.
      '
    auth:
      method: mcp             # Claude.ai Slack MCP — auth handled by Claude
      credential_key: ''      # not used in MCP mode
      setup_script: scripts/setup_slack.py   # kept for bot fallback if needed
    fetch:
      handler: mcp            # use mcp__claude_ai_Slack__* tools
      default_max_results: 50
      default_lookback: 7d
      channels:
        - '#general'          # CCU8WMHKL — workspace announcements
        - '#c5'               # C05CM79QQAK — HMBA cohort 5 (your cohort)
        - '#c5-alumni-planning-group'  # C06P1D2V7PY — C5 alumni events
        - '#jobpostings'      # CF8F2QCM9 — job opportunities
        - '#seattle-events'   # CD50UTJUT — local Seattle events
        - '#random'           # CCTM6127K — general discussion
      workspace_slug: ''      # not needed in MCP mode
      include_replies: false
      routing:
        default_domain: comms   # Foster MBA = alumni/social, routes to comms.md
        overrides:
          '#jobpostings': employment
          '#jobsearching': employment
    output:
      format: jsonl
      fields:
      - id
      - title
      - body
      - author
      - ts
      - url
      - source
      - channel
      - thread_ts
      - reactions
      source_tag: slack_foster_mba
    health_check: false      # MCP health not checkable via pipeline preflight
    mcp:
      prefer_mcp: true
      tool_prefix: mcp__claude_ai_Slack__slack
      fallback: disabled      # no bot fallback configured
    retry:
      max_retries: 3
      base_delay: 1.0
      max_delay: 30.0
