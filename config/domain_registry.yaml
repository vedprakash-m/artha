# config/domain_registry.yaml — Artha Domain Registry
# Version: 1.0 | Updated: 2026-03-14
#
# Single manifest for every domain: dependencies, sensitivity, loading rules,
# auto-enable conditions, and household type applicability.
#
# Used by:
#   - profile_loader.py: available_domains(), toggle_domain(), domain_registry()
#   - generate_identity.py: prompt assembly (only enabled domains)
#   - Artha.core.md §lazy loading: always_load field for Tier 1 context optimization
#   - vault_guard.py: derives SENSITIVE_DOMAINS dynamically
#
# Ref: specs/enhance.md §2.2, §9.2

schema_version: "1.0"

domains:

  # ── Always-load domains (finance, immigration, health, calendar, comms, goals) ──────
  # These load on every catch-up regardless of email signal.
  # Rationale: false-negative risk too high for deadlines and reminders.

  immigration:
    label: "Immigration & Visa"
    description: "USCIS filings, visa status, passport, travel docs"
    sensitivity: high
    staleness_ttl_days: 90
    always_load: true
    phase: existing
    prompt_file: "prompts/immigration.md"
    state_file: "state/immigration.md.age"
    requires_vault: true
    enabled_by_default: true
    household_types: [family, couple, single, multi_gen, roommates]
    requires_connectors: []
    optional_connectors: []
    auto_enable_when: []
    setup_questions:
      - "Do you have an active immigration case or visa?"
    routing_keywords:
      - USCIS
      - I-765
      - I-485
      - I-140
      - visa
      - receipt notice
      - EAD
      - green card
      - Form I-
      - H-1B
      - H-4
      - PERM
      - Fragomen
      - priority date
      - labor condition
      - I-539
      - I-131
    alert_thresholds:
      red: "Visa expires in <30 days, case denied"
      orange: "Visa expires in <90 days, RFE received"
      yellow: "Priority date advanced, new form available"
      blue: "Receipt notice received, status update"

