      - prescription
      - pharmacy
      - lab results
      - insurance
      - EOB
      - doctor
      - clinic
      - diagnosis
      - medication
    alert_thresholds:
      red: "Prescription runs out in <7 days, missed appointment"
      orange: "Appointment in <48 hours, prescription due for refill"
      yellow: "Lab results available, appointment in <1 week"
      blue: "Appointment confirmation, EOB received"

  calendar:
