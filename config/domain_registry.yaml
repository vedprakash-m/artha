    household_types: [family, couple, single, multi_gen, roommates]
    requires_connectors: []
    optional_connectors: [plaid]
    auto_enable_when: []
    setup_questions:
      - "Do you want to track bills and bank accounts?"
    routing_keywords:
      - bill
      - statement
      - payment due
      - bank
      - credit card
      - invoice
      - tax
      - refund
      - transfer
      - subscription
    alert_thresholds:
      red: "Bill 10+ days overdue, unusual charge >$500"
      orange: "Bill due within 7 days, subscription price increase"
      yellow: "Bill due within 14 days, statement available"
      blue: "Payment confirmed, receipt"

  health:
    label: "Healthcare"
    description: "Doctor appointments, prescriptions, insurance, lab results"
    sensitivity: high
    always_load: true
    phase: existing
    prompt_file: "prompts/health.md"
