    routing_keywords:
      - bill
      - statement
      - payment due
      - bank
      - credit card
      - invoice
      - tax
      - refund
      - transfer
      - subscription
      # Gig & platform income routing (I-03: specs/improve.md)
      - Stripe
      - PayPal
      - Venmo
      - Upwork
      - Fiverr
      - Etsy
      - "1099-K"
      - "1099-NEC"
      - payout
      - "earnings summary"
      - "direct deposit"
      - DoorDash
      - "Uber earnings"
    alert_thresholds:
      red: "Bill 10+ days overdue, unusual charge >$500"
      orange: "Bill due within 7 days, subscription price increase"
      yellow: "Bill due within 14 days, statement available"
      blue: "Payment confirmed, receipt"

  health:
    label: "Healthcare"
    description: "Doctor appointments, prescriptions, insurance, lab results"
    sensitivity: high
    always_load: true
    phase: existing
    prompt_file: "prompts/health.md"
    state_file: "state/health.md.age"
