# config/lint_rules.yaml — KB-LINT cross-domain (P5) and coherence rules
# Version: 1.0
#
# Each rule defines a cross-domain coherence check: if `domain_a` has a
# finding containing `field_a`, then `domain_b`'s `field_b` must also be
# present and non-empty. Missing/empty `field_b` produces a P5 WARNING.
#
# Fields:
#   id         — unique rule identifier (used in LintFinding.pass_id)
#   domain_a   — source domain name (must match domain_registry.yaml key)
#   field_a    — frontmatter field to test in domain_a (presence + non-empty)
#   domain_b   — target domain that should also have the linked field
#   field_b    — frontmatter field that must be present in domain_b
#   message    — human-readable description of the coherence requirement
#
# Rules are loaded at startup. Any rule with an unrecognised domain or missing
# required field is skipped and a startup warning is emitted to stderr.
#
# Ref: specs/kb.md §P5 Cross-Reference Checker

schema_version: "1.0"

rules:

  - id: xref-immigration-travel
    domain_a: immigration
    field_a: visa_expiry
    domain_b: travel
    field_b: passport_expiry
    message: "Immigration visa_expiry set but travel.passport_expiry is missing"
    severity: WARNING
    enabled: true

  - id: xref-insurance-finance
    domain_a: insurance
    field_a: premium_monthly
    domain_b: finance
    field_b: monthly_budget
    message: "Insurance premiums tracked but finance.monthly_budget is missing"
    severity: WARNING
    enabled: true

  - id: xref-kids-health
    domain_a: kids
    field_a: children
    domain_b: health
    field_b: last_updated
    message: "Kids domain active but health.last_updated is missing"
    severity: INFO
    enabled: true

  - id: xref-employment-insurance
    domain_a: employment
    field_a: employer
    domain_b: insurance
    field_b: health_plan
    message: "Employment.employer set but insurance.health_plan is missing"
    severity: WARNING
    enabled: true

  - id: xref-health-insurance
    domain_a: health
    field_a: primary_care_provider
    domain_b: insurance
    field_b: health_plan
    message: "Health.primary_care_provider set but insurance.health_plan is missing"
    severity: WARNING
    enabled: true

  - id: xref-vehicle-insurance
    domain_a: vehicle
    field_a: vehicles
    domain_b: insurance
    field_b: auto_policy
    message: "Vehicle domain active but insurance.auto_policy is missing"
    severity: WARNING
    enabled: true

  - id: xref-home-insurance
    domain_a: home
    field_a: address
    domain_b: insurance
    field_b: home_policy
    message: "Home.address set but insurance.home_policy is missing"
    severity: WARNING
    enabled: true

  - id: xref-finance-items
    domain_a: finance
    field_a: monthly_budget
    domain_b: decisions
    field_b: last_updated
    message: "Finance.monthly_budget set but decisions state file has no last_updated"
    severity: INFO
    enabled: true
