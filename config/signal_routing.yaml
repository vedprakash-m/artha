# Signal routing table — maps signal_type to action metadata.
# Used by action_composer.py to convert DomainSignal → ActionProposal.
# Fallback: _FALLBACK_SIGNAL_ROUTING loaded from this YAML at import time by action_composer.py.
#
# Fields per entry:
#   action_type:     The action to compose (must be in _ALLOWED_ACTION_TYPES)
#   friction:        User friction level: low | standard | high
#   min_trust:       Minimum trust level required to auto-execute (0–2)
#   reversible:      Whether the action can be undone
#   undo_window_sec: Seconds to undo (null if irreversible)
#   status:          Route lifecycle: active (has a producer) | stub (Phase 2 forward-declaration)
#
# Ref: specs/pay-debt-reloaded.md §7 WS-7

