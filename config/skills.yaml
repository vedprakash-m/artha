skills:
  uscis_status:
    enabled: true
    priority: P0
    cadence: every_run
  # property_tax is the generalized skill (reads provider URL from user_profile.yaml).
  # king_county_tax is a backward-compatibility alias for the same skill.
  property_tax:
    enabled: false  # Enable for new installations; king_county_tax entry below covers existing users
    priority: P1
    cadence: daily
  king_county_tax:
    enabled: true
    priority: P1
    cadence: daily
  visa_bulletin:
    enabled: true
    priority: P0
    cadence: weekly
  noaa_weather:
    enabled: true
    priority: P1
    cadence: every_run
    trigger_keywords: ["hike", "summit", "trail", "peak"]
  nhtsa_recalls:
    enabled: true
    priority: P1
    cadence: weekly
  passport_expiry:
    enabled: true
    priority: P1
    cadence: every_run
    requires_vault: true
    safety_critical: false
    description: "Check passport expiry dates from decrypted immigration state. Alerts at 180/90/60 days."
  subscription_monitor:
    enabled: true
    priority: P1
    cadence: every_run
    requires_vault: false
    safety_critical: false
    description: "Detect subscription price increases and trial-to-paid conversions from state/digital.md."
  financial_resilience:
    enabled: true
    priority: P1
    cadence: weekly
    requires_vault: true
    safety_critical: false
    description: "Compute monthly burn rate, emergency fund runway, and single-income stress scenario from state/finance.md."

  # ── New skills added 2026-03-15 (U-9.1 to U-9.5) ─────────────────────

  relationship_pulse:
    enabled: true
    priority: P1
    cadence: every_run
    requires_vault: false
    safety_critical: false
    description: "Check contact freshness across circles. Nudges stale relationships; cadence-aware."

  occasion_tracker:
    enabled: true
    priority: P1
    cadence: every_run
    requires_vault: false
    safety_critical: false
    description: "7-day lookahead for birthdays, anniversaries, Indian festivals, US holidays. Greeting suggestions."

  bill_due_tracker:
    enabled: true
    priority: P1
    cadence: every_run
    requires_vault: false
    safety_critical: false
    description: "Extract bill due dates from occasions.md. Alert 7/3/1 days before due, flag overdue."

  whatsapp_last_contact:
    enabled: true
    priority: P1
    cadence: every_run
    requires_vault: false
    safety_critical: false
    platform: macos_only
    description: "Refresh Last WA dates and relationship warmth from local WhatsApp ChatStorage.sqlite. Surfaces stale contacts per circle cadence and infers birthdays from sent wishes."

  credit_monitor:
    enabled: true
    priority: P1
    cadence: daily
    requires_vault: false
    safety_critical: false
    description: "Scan state files for credit monitoring signals. Hard inquiries, score changes, fraud alerts."

  school_calendar:
    enabled: true
    priority: P1
    cadence: daily
    requires_vault: false
    safety_critical: false
    description: "Track LWSD school events for Parth and Trisha. Alert 3 days ahead. Scans kids.md for grade alerts."

