# config/user_profile.example.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Artha User Profile — EXAMPLE (fictional placeholder family)
#
# Copy this file to config/user_profile.yaml and fill in your own details.
# The /bootstrap command will do this conversationally for you.
#
# This file is the sole source of truth for your identity and integration config.
# It is NEVER committed to git (see .gitignore).
# ─────────────────────────────────────────────────────────────────────────────

schema_version: "1.0"

# ─── Family ───────────────────────────────────────────────────────────────────
family:
  name: "Smith"                       # Family surname (used in prompts + briefings)
  cultural_context: >                 # Optional — enriches prompt quality significantly.
    Leave blank or use a preset name from config/presets/cultural/.
    Examples: south-asian-american, first-gen-immigrant, european-american.

  primary_user:
    name: "Alex Smith"
    nickname: "Alex"                   # Nickname used in briefings
    role: primary
    emails:
      gmail: "alex.smith@gmail.com"
      outlook: "asmith@outlook.com"    # Optional — set "" if not used
      icloud: "asmith@me.com"          # Optional — set "" if not used
    phone: "+1 (555) 123-4567"        # Optional — used only in contacts context

  spouse:
    enabled: true                     # Set false for single-user household
    name: "Sam"
    role: spouse
    filtered_briefing: true           # Generate a privacy-filtered briefing for spouse

  children:                           # Empty list [] if no children
    - name: "Child1"
      age: 16
      grade: "11th"
      school:
        name: "Example High School"
        district: "Example School District"
        canvas_url: "https://example.instructure.com"   # Canvas LMS URL, or "" if N/A
        canvas_keychain_key: "artha-canvas-token-child1" # Keychain service name for Canvas token
      milestones:
        college_prep: true            # Enable SAT/ACT tracking, college countdown
        class_of: 2027
        new_driver: true              # Enable auto insurance new-driver alerts
    - name: "Child2"
      age: 12
      grade: "7th"
      school:
        name: "Example Middle School"
        district: "Example School District"
        canvas_url: ""                # No Canvas for this school
        canvas_keychain_key: ""
      milestones:
        college_prep: false
        class_of: 2031
        new_driver: false

# ─── Location ─────────────────────────────────────────────────────────────────
location:
  city: "Springfield"                    # Replace with your city
  state: "IL"                            # Replace with your state abbreviation
  county: "Sangamon"                     # Replace with your county
  country: "US"
  lat: 39.7817                           # Replace with your latitude (used by NOAA weather skill)
  lon: -89.6501                          # Replace with your longitude
  timezone: "America/Chicago"            # Replace with your timezone — see Continent/City format
  property_tax_provider: ""              # See scripts/skills/property_tax.py for supported providers
  property_parcel_id: ""                 # Your county parcel number (optional)

# ─── Domains ──────────────────────────────────────────────────────────────────
# Set enabled: true for domains you want Artha to actively monitor.
# Domains you leave disabled are simply ignored during catch-up.
domains:
  immigration:
    enabled: true
    context: >
      Example: H-1B holder, EB-2 priority date YYYY-MM-DD.
      Spouse on H-4 with EAD. I-485 pending.
      Replace with your actual case details — keep this minimal.
      Full case details live in state/immigration.md.
  finance:
    enabled: true
    institutions:                      # Add sender domains for your financial institutions
      - "chase.com"
      - "fidelity.com"
      - "vanguard.com"
      - "wellsfargo.com"
    alert_thresholds:
      bill_due_days: 7                 # Alert N days before bill due
      low_balance_usd: 1000
  kids:
    enabled: true                      # Auto-set based on children list above
  health:
    enabled: true
  travel:
    enabled: true
  home:
    enabled: true
  shopping:
    enabled: true
  goals:
    enabled: true
  vehicle:
    enabled: true
    vin: ""                            # Optional VIN for NHTSA recall skill
    vehicles:                          # Optional — used by nhtsa_recalls skill if VIN unknown
      - make: "Toyota"
        model: "Camry"
        year: "2023"
        vin: ""
  estate:
    enabled: false
  insurance:
    enabled: true
  calendar:
    enabled: true
  comms:
    enabled: true
  social:
    enabled: true
  digital:
    enabled: true
  boundary:
    enabled: false                     # Work-life boundary tracking
  learning:
    enabled: false                     # Personal learning tracking
  employment:
    enabled: false
    employer: ""
    workiq_enabled: false              # WorkIQ corporate calendar (Windows only)
  decisions:
    enabled: false                     # Active decision log and scenario analysis
  pets:
    enabled: false                     # Pet health, vaccinations, vet appointments
  caregiving:
    enabled: false                     # Elder care coordination and communications
  business:
    enabled: false                     # Side project or small business tracking
  wellness:
    enabled: false                     # Fitness, nutrition, and wellness goals
  community:
    enabled: false                     # Volunteering, donations, community orgs

# ─── System ───────────────────────────────────────────────────────────────────
system:
  artha_dir: ""                        # Root directory — auto-detected from repo location if blank
  sync_provider: "none"               # onedrive | icloud | dropbox | none
  venv_path: "~/.artha-venvs/.venv"    # Python venv path (macOS/Linux)
  venv_path_win: "~/.artha-venvs/.venv-win"  # Python venv path (Windows)
  python_cmd: "python3"                # Python executable name
  briefing_timezone: "America/Los_Angeles"
  cost_budget_monthly_usd: 25

# ─── Integrations ─────────────────────────────────────────────────────────────
integrations:
  gmail:
    enabled: true
    account: "alex.smith@gmail.com"   # Populated during setup
  google_calendar:
    enabled: true
    calendar_ids:
      primary: "primary"
      additional:
        - ""                           # e.g., "family1234@group.calendar.google.com"
      holidays: "en.usa#holiday@group.v.calendar.google.com"
  microsoft_graph:
    enabled: false
    account: ""                        # e.g., "asmith@outlook.com"
    todo_sync: false
    todo_lists: {}                     # Populated by: python scripts/setup_todo_lists.py
  icloud:
    enabled: false
    account: ""                        # Apple ID email
  canvas_lms:
    enabled: true                      # Auto-set true if any child has canvas_url
  workiq:
    enabled: false
    platform: "windows"                # windows-only feature
    version_pin: "0.x"
    query_variant: "auto"
    redact_keywords: []
    redact_replacement: "[REDACTED]"
    oi_trigger_keywords:               # Calendar titles that auto-create open items
      - "Interview"
      - "Performance Review"

# ─── Briefing ─────────────────────────────────────────────────────────────────
briefing:
  email: "alex.smith@gmail.com"       # Where to send briefings
  timezone: "America/Los_Angeles"
  default_format: "standard"
  spouse_filtered: true                  # Generate spouse-filtered copy
  email_enabled: false                   # Set true to send briefings via email
  archive_enabled: true                  # Save to briefings/ directory
  weekend_planner: true
  monthly_retrospective: true

# ─── Budget ───────────────────────────────────────────────────────────────────
budget:
  monthly_api_budget_usd: 25
  alert_at_percent: 80
  currency: "USD"

# ─── Encryption ───────────────────────────────────────────────────────────────
encryption:
  # After running: age-keygen — paste the PUBLIC key here.
  # Store PRIVATE key in OS keychain (macOS Keychain / Windows Credential Manager).
  age_recipient: ""    # e.g., "age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# ─── Capabilities (Feature Flags) ────────────────────────────────────────────
capabilities:
  gmail_mcp: true
  calendar_mcp: true
  gemini_cli: false
  copilot_cli: false
  vault_encryption: true
  email_briefings: true
  weekly_summary: true
  action_proposals: true
  ensemble_reasoning: false
  visual_generation: false
  proactive_checkin: false
  todo_sync: false
  outlook_forwarding: false
  apple_forwarding: false
  icloud_direct_api: false
  preflight_gate: true
  open_items_tracking: true
  workiq_calendar: false
