      - 2024 W-2 received. Organize for filing. (This is the 2025 tax year.)

  - id: anti-missing-one-thing
    description: "Briefing without ONE THING or priority signal"
    expected: fail
    max_quality_score: 45
    dimension_checks:
      completeness: {max: 12}
    briefing: |
