    briefing: |
      # Catch-Up Briefing — 2026-02-01

      ## EMAIL SUMMARY
      - Target sale: 20% off furniture through Feb 28.
      - LinkedIn: 5 people viewed your profile this week.
      - Spotify: Your 2025 Wrapped is ready!
